<!doctype html>
<html lang="pl">
    <head>
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta charset="UTF-8" />
        <title>Hephaestus</title>
        <style>
            @font-face {
                font-family: "Outfit";
                src: url("/assets/outfit.woff2") format("woff2");
                font-weight: 100 900;
                font-display: swap;
                font-style: normal;
                unicode-range:
                    U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6,
                    U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC,
                    U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
            }
            @font-face {
                font-family: "Outfit";
                src: url("/assets/outfit-ext.woff2") format("woff2");
                font-weight: 100 900;
                font-display: swap;
                font-style: normal;
                unicode-range:
                    U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7,
                    U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF,
                    U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0,
                    U+2113, U+2C60-2C7F, U+A720-A7FF;
            }

            body {
                background: #18181b;
                font-family: "Outfit", Cantarell, Arial, sans-serif;
                font-synthesis: none;
                color: white;
                width: 350px;
                padding: 10px;
            }

            body.mobile {
                width: calc(100% - (2 * 18px)) !important;
            }
        </style>
    </head>

    <body>
        <div id="app"></div>
        <script>
            if (/\bMobile\b/.test(navigator.userAgent))
                document.body.classList.add("mobile");
        </script>
        <script type="module" src="index.ts"></script>
    </body>
</html>
